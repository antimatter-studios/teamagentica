name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check-changes:
    name: check changes
    runs-on: ubuntu-latest
    outputs:
      tacli: ${{ steps.filter.outputs.tacli }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            tacli: ['tacli/**', '.goreleaser.yml']

  tacli-release:
    name: tacli release
    needs: check-changes
    if: needs.check-changes.outputs.tacli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: tacli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
