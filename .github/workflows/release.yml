name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check-changes:
    name: check changes
    runs-on: ubuntu-latest
    outputs:
      tacli: ${{ steps.check.outputs.tacli }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Diff against previous tag
        id: check
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "tacli=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$PREV_TAG"..HEAD -- tacli/ .goreleaser.yml | grep -q .; then
            echo "tacli=true" >> "$GITHUB_OUTPUT"
          else
            echo "tacli=false" >> "$GITHUB_OUTPUT"
          fi

  tacli-release:
    name: tacli release
    needs: check-changes
    if: needs.check-changes.outputs.tacli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: tacli/go.sum

      - name: Generate tacli changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"* %s (%h)" "$PREV_TAG"..HEAD -- tacli/ .goreleaser.yml \
              | grep -vE '^(\* (docs|test|ci|chore)[(:])' > /tmp/changelog.md || true
          else
            git log --pretty=format:"* %s (%h)" HEAD -- tacli/ .goreleaser.yml \
              | grep -vE '^(\* (docs|test|ci|chore)[(:])' > /tmp/changelog.md || true
          fi
          # fallback if empty
          [ -s /tmp/changelog.md ] || echo "* Maintenance release" > /tmp/changelog.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes /tmp/changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
