name: teamagentica

services:
  kernel:
    hostname: teamagentica-kernel
    build:
      context: ./kernel
      dockerfile: Dockerfile
      target: prod
    ports:
      - "9741:8080"
    environment:
      - APP_NAME=${APP_NAME:-TeamAgentica}
      - TEAMAGENTICA_KERNEL_HOST=0.0.0.0
      - TEAMAGENTICA_KERNEL_PORT=8080
      - TEAMAGENTICA_KERNEL_ADVERTISE_HOST=teamagentica-kernel
      - TEAMAGENTICA_JWT_SECRET=${TEAMAGENTICA_JWT_SECRET:?JWT secret required}
      - TEAMAGENTICA_DB_PATH=/data/kernel/database.db
      - TEAMAGENTICA_DATA_DIR=/data
      - TEAMAGENTICA_DOCKER_NETWORK=teamagentica_default
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  user-interface:
    build:
      context: ./user-interface
      dockerfile: Dockerfile
      target: prod
      args:
        - VITE_APP_NAME=${APP_NAME:-TeamAgentica}
        - VITE_TEAMAGENTICA_KERNEL_HOST=${TEAMAGENTICA_KERNEL_HOST:-localhost}
        - VITE_TEAMAGENTICA_KERNEL_PORT=${TEAMAGENTICA_KERNEL_PORT:-9741}
    ports:
      - "3000:3000"
    depends_on:
      kernel:
        condition: service_healthy
    restart: unless-stopped
