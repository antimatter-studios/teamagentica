plugin_env:
  GOMODCACHE: /go/pkg/mod
  GOCACHE: /root/.cache/go-build
  GOWORK: /pkg/pluginsdk/go.work

data_mount:
  type: bind
  source: "${DATA_DIR}/${PLUGIN_ID}"

storage_cross_mount:
  type: bind
  source: "${DATA_DIR}/storage-disk"

plugin_mounts:
  - type: bind
    source: "${PROJECT_ROOT}/plugins/${PLUGIN_DIR}"
    target: /app
  - type: bind
    source: "${PROJECT_ROOT}/pkg/pluginsdk"
    target: /pkg/pluginsdk
    readonly: true
  - type: volume
    source: "${NETWORK}-gomodcache"
    target: /go/pkg/mod
  - type: volume
    source: "${NETWORK}-gobuildcache"
    target: /root/.cache/go-build

managed_disk_mount:
  type: bind
  source: "${DATA_DIR}/storage-disk/disks/${DISK_NAME}"

managed_extra_mount:
  type: bind
  source: "${DATA_DIR}/storage-disk/disks/${DISK_NAME}"

managed_plugin_source:
  enabled: true
  source: "${PROJECT_ROOT}/plugins/${PLUGIN_SOURCE}"
  extra_mounts:
    - type: volume
      source: "${NETWORK}-gomodcache"
      target: /go/pkg/mod
    - type: volume
      source: "${NETWORK}-gobuildcache"
      target: /root/.cache/go-build
