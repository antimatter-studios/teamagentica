plugin_env: {}

data_mount:
  type: bind
  source: "${DATA_DIR}/${PLUGIN_ID}"

storage_cross_mount:
  type: bind
  source: "${DATA_DIR}/storage-disk"

plugin_mounts: []

shared_disk_mount:
  type: bind
  source: "${DATA_DIR}/storage-disk/storage-root/shared/${DISK_NAME}"

managed_plugin_source:
  enabled: false
