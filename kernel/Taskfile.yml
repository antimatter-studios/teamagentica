version: '3'

vars:
  BINARY_NAME: kernel
  BUILD_DIR: ./build

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  dev:
    desc: Run in dev mode with hot reload (Air)
    env:
      TEAMAGENTICA_JWT_SECRET: dev-secret-change-me
      TEAMAGENTICA_DB_PATH: ./dev.db
    cmds:
      - air

  build:
    desc: Build production binary
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - CGO_ENABLED=1 go build -ldflags="-s -w" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}}"

  run:
    desc: Run production binary
    deps: [build]
    cmds:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}}"

  test:
    desc: Run tests
    cmds:
      - go test ./... -v

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}} dev.db

  migrate:
    desc: Run database migrations (auto-migrate on startup)
    env:
      TEAMAGENTICA_JWT_SECRET: dev-secret-change-me
      TEAMAGENTICA_DB_PATH: ./dev.db
    cmds:
      - echo "Migrations run automatically on startup via GORM AutoMigrate"

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t teamagentica-kernel:latest .

  docker:run:
    desc: Run Docker container
    deps: [docker:build]
    cmds:
      - docker run -p 8080:8080 -e TEAMAGENTICA_JWT_SECRET=change-me teamagentica-kernel:latest
