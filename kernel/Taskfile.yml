version: '3'

tasks:
  build:
    desc: Build production kernel image via Docker Compose
    cmds:
      - docker compose -f docker-compose.yml --profile prod build

  start:
    desc: Start production kernel container
    cmds:
      - docker compose -f docker-compose.yml --profile prod up -d

  stop:
    desc: Stop production kernel container
    cmds:
      - docker compose -f docker-compose.yml --profile prod down

  restart:
    desc: Restart production kernel container
    cmds:
      - task: stop
      - task: start

  logs:
    desc: Follow kernel container logs
    cmds:
      - docker compose -f docker-compose.yml logs -f

  dev:build:
    desc: Build dev kernel image via Docker Compose
    cmds:
      - docker compose -f docker-compose.yml --profile dev build

  dev:start:
    desc: Start dev kernel container (hot reload with Air)
    cmds:
      - docker compose -f docker-compose.yml --profile dev up -d

  dev:stop:
    desc: Stop dev kernel container
    cmds:
      - docker compose -f docker-compose.yml --profile dev down

  dev:restart:
    desc: Restart dev kernel container
    cmds:
      - task: dev:stop
      - task: dev:start

  dev:logs:
    desc: Follow dev kernel container logs
    cmds:
      - docker compose -f docker-compose.yml --profile dev logs -f

  test:
    desc: Run tests inside container
    cmds:
      - docker compose -f docker-compose.yml --profile dev run --rm --no-deps kernel-dev go test ./... -v

  lint:
    desc: Run linter inside container
    cmds:
      - docker compose -f docker-compose.yml --profile dev run --rm --no-deps kernel-dev golangci-lint run ./...

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf ./build
