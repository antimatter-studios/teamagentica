    dir: ./plugins/agent-gemini
  agent-kimi:
    taskfile: ./plugins/agent-kimi/Taskfile.yml
    dir: ./plugins/agent-kimi
  agent-openai:
    taskfile: ./plugins/agent-openai/Taskfile.yml
    dir: ./plugins/agent-openai
  agent-openrouter:
    taskfile: ./plugins/agent-openrouter/Taskfile.yml
    dir: ./plugins/agent-openrouter
  agent-requesty:
    taskfile: ./plugins/agent-requesty/Taskfile.yml
    dir: ./plugins/agent-requesty
  builtin-provider:
    taskfile: ./plugins/builtin-provider/Taskfile.yml
