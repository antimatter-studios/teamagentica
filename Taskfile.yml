  network-ngrok:
    taskfile: ./plugins/network-ngrok/Taskfile.yml
    dir: ./plugins/network-ngrok
  messaging-telegram:
    taskfile: ./plugins/messaging-telegram/Taskfile.yml
    dir: ./plugins/messaging-telegram
  tool-nanobanana:
    taskfile: ./plugins/tool-nanobanana/Taskfile.yml
    dir: ./plugins/tool-nanobanana
  tool-seedance:
    taskfile: ./plugins/tool-seedance/Taskfile.yml
    dir: ./plugins/tool-seedance
  tool-stability:
    taskfile: ./plugins/tool-stability/Taskfile.yml
    dir: ./plugins/tool-stability
  tool-veo:
    taskfile: ./plugins/tool-veo/Taskfile.yml
    dir: ./plugins/tool-veo
  network-webhook-ingress:
    taskfile: ./plugins/network-webhook-ingress/Taskfile.yml
    dir: ./plugins/network-webhook-ingress
  storage-sss3:
    taskfile: ./plugins/storage-sss3/Taskfile.yml
    dir: ./plugins/storage-sss3
  messaging-whatsapp:
    taskfile: ./plugins/messaging-whatsapp/Taskfile.yml
    dir: ./plugins/messaging-whatsapp
  user-vscode-server:
    taskfile: ./plugins/user-vscode-server/Taskfile.yml
    dir: ./plugins/user-vscode-server
  agent-claude:
    taskfile: ./plugins/agent-claude/Taskfile.yml
    dir: ./plugins/agent-claude
  agent-inception:
    taskfile: ./plugins/agent-inception/Taskfile.yml
    dir: ./plugins/agent-inception
  messaging-chat:
    taskfile: ./plugins/messaging-chat/Taskfile.yml
    dir: ./plugins/messaging-chat
  storage-volume:
    taskfile: ./plugins/storage-volume/Taskfile.yml
    dir: ./plugins/storage-volume
  infra-workspace-manager:
    taskfile: ./plugins/infra-workspace-manager/Taskfile.yml
    dir: ./plugins/infra-workspace-manager
  infra-cron-scheduler:
    taskfile: ./plugins/infra-cron-scheduler/Taskfile.yml
    dir: ./plugins/infra-cron-scheduler
  infra-mcp-server:
    taskfile: ./plugins/infra-mcp-server/Taskfile.yml
    dir: ./plugins/infra-mcp-server

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:all:
    desc: Run tests for all modules
    cmds:
      - task: kernel:test
      - task: pluginsdk:test
      - task: agent-gemini:test
      - task: agent-kimi:test
      - task: agent-openai:test
      - task: agent-openrouter:test
      - task: agent-requesty:test
      - task: builtin-provider:test
      - task: infra-cost-explorer:test
      - task: storage-sss3:test
      - task: messaging-discord:test
      - task: network-ngrok:test
      - task: messaging-telegram:test
      - task: tool-nanobanana:test
      - task: tool-seedance:test
      - task: tool-stability:test
      - task: tool-veo:test
      - task: network-webhook-ingress:test
      - task: messaging-whatsapp:test
      - task: user-vscode-server:test

  build:catalog:
    desc: Rebuild the plugin catalog from plugin.yaml manifests
    cmds:
      - go run ./plugins/builtin-provider/cmd/build-catalog ./plugins ./plugins/builtin-provider/catalog.yaml

  dev:start:
    desc: Run all services in dev mode (Docker, hot reload)
    cmds:
      - task: build:catalog
      - docker compose -f docker-compose.dev.yml up --build -d --remove-orphans --renew-anon-volumes
      - |
        echo "Waiting for services to start..."
        for i in $(seq 1 30); do
          if docker compose -f docker-compose.dev.yml ps --format json | grep -q '"healthy"'; then
            echo ""
            echo "============================================"
            echo "  TeamAgentica is running!"
            echo "  UI:     http://localhost:3000"
            echo "  Kernel: http://localhost:9741"
            echo "============================================"
            echo ""
            break
          fi
          printf "."
          sleep 2
        done
      - docker compose -f docker-compose.dev.yml logs -f

  dev:log:f:
    desc: Follow dev service logs
    cmds:
      - docker compose -f docker-compose.dev.yml logs -f

  dev:stop:
    desc: Stop dev services
    cmds:
      - docker compose -f docker-compose.dev.yml down

  dev:restart:
    desc: Restart all dev services
    cmds:
      - task: dev:stop
      - task: dev:start

  prod:start:
    desc: Run all services in prod mode (Docker)
    cmds:
      - docker compose up --build

  prod:stop:
    desc: Stop prod services
    cmds:
      - docker compose down

  prod:restart:
    desc: Restart all prod services
    cmds:
      - task: prod:stop
      - task: prod:start

  build:
    desc: Build all services
    deps:
      - kernel:build
      - agent-gemini:build
      - agent-kimi:build
      - agent-openai:build
      - agent-openrouter:build
      - agent-requesty:build
      - builtin-provider:build
      - infra-cost-explorer:build
      - storage-sss3:build
      - messaging-discord:build
      - network-ngrok:build
      - messaging-telegram:build
      - tool-nanobanana:build
      - tool-seedance:build
      - tool-stability:build
      - tool-veo:build
      - network-webhook-ingress:build
      - messaging-whatsapp:build
      - user-vscode-server:build

  build:images:
    desc: Build all plugin Docker images (sequential)
    cmds:
      - task: agent-claude:docker:prod
      - task: agent-gemini:docker:prod
      - task: agent-inception:docker:prod
      - task: agent-kimi:docker:prod
      - task: agent-openai:docker:prod
      - task: agent-openrouter:docker:prod
      - task: agent-requesty:docker:prod
      - task: builtin-provider:docker:prod
      - task: infra-cost-explorer:docker:prod
      - task: infra-cron-scheduler:docker:prod
      - task: infra-mcp-server:docker:prod
      - task: infra-workspace-manager:docker:prod
      - task: messaging-chat:docker:prod
      - task: messaging-discord:docker:prod
      - task: messaging-telegram:docker:prod
      - task: messaging-whatsapp:docker:prod
      - task: network-ngrok:docker:prod
      - task: network-webhook-ingress:docker:prod
      - task: storage-sss3:docker:prod
      - task: storage-volume:docker:prod
      - task: tool-nanobanana:docker:prod
      - task: tool-seedance:docker:prod
      - task: tool-stability:docker:prod
      - task: tool-veo:docker:prod
      - task: user-vscode-server:docker:prod
      - echo "All plugin images built successfully"
      - task: restart:running

  build:images:dev:
    desc: Build all plugin Docker images for dev (sequential)
    cmds:
      - task: agent-claude:docker:dev
      - task: agent-gemini:docker:dev
      - task: agent-inception:docker:dev
      - task: agent-kimi:docker:dev
      - task: agent-openai:docker:dev
      - task: agent-openrouter:docker:dev
      - task: agent-requesty:docker:dev
      - task: builtin-provider:docker:dev
      - task: infra-cost-explorer:docker:dev
      - task: infra-cron-scheduler:docker:dev
      - task: infra-mcp-server:docker:dev
      - task: infra-workspace-manager:docker:dev
      - task: messaging-chat:docker:dev
      - task: messaging-discord:docker:dev
      - task: messaging-telegram:docker:dev
      - task: messaging-whatsapp:docker:dev
      - task: network-ngrok:docker:dev
      - task: network-webhook-ingress:docker:dev
      - task: storage-sss3:docker:dev
      - task: storage-volume:docker:dev
      - task: tool-nanobanana:docker:dev
      - task: tool-seedance:docker:dev
      - task: tool-stability:docker:dev
      - task: tool-veo:docker:dev
      - task: user-vscode-server:docker:dev
      - echo "All dev plugin images built successfully"
      - task: restart:running

  restart:running:
    desc: Restart any running plugin containers so they pick up new images
    cmds:
      - |
        containers=$(docker ps --filter "name=teamagentica-plugin-" | awk 'NR>1 {print $NF}')
        if [ -z "$containers" ]; then
          echo "No running plugin containers to restart"
          exit 0
        fi
        echo "$containers" | while IFS= read -r c; do
          plugin_id=$(echo "$c" | sed 's/teamagentica-plugin-//')
          echo "Restarting $plugin_id..."
          docker stop "$c" 2>/dev/null || true
          docker rm -f "$c" 2>/dev/null || true
        done
        echo ""
        echo "Removed old containers. Restarting kernel to re-launch plugins..."
        kernel_id=$(docker ps -q --filter "name=kernel" | head -1)
        docker restart "$kernel_id" 2>/dev/null || true
        echo "Done. Kernel will re-launch all enabled plugins on startup."
    silent: true

  clean:
    desc: Clean all build artifacts
    deps:
      - kernel:clean
      - agent-gemini:clean
      - agent-kimi:clean
      - agent-openai:clean
      - agent-openrouter:clean
      - agent-requesty:clean
      - builtin-provider:clean
      - infra-cost-explorer:clean
      - storage-sss3:clean
      - messaging-discord:clean
      - network-ngrok:clean
      - messaging-telegram:clean
      - tool-nanobanana:clean
      - tool-seedance:clean
      - tool-stability:clean
      - tool-veo:clean
      - network-webhook-ingress:clean
      - messaging-whatsapp:clean
      - user-vscode-server:clean
