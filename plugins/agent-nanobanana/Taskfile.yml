version: '3'

vars:
  BINARY_NAME: agent-nanobanana
  BUILD_DIR: ./build
  DEV_IMAGE: teamagentica-agent-nanobanana:dev

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Build prod Docker image
    cmds:
      - docker build -t teamagentica-{{.BINARY_NAME}}:latest -f Dockerfile --target prod ../..

  build:dev:
    desc: Build dev Docker image
    cmds:
      - docker build -t teamagentica-{{.BINARY_NAME}}:dev -f Dockerfile --target dev ../..

  test:
    desc: Run unit tests with coverage inside the dev Docker image
    deps:
      - build:dev
    cmds:
      - docker run --rm -t --entrypoint go {{.DEV_IMAGE}} test -v ./... -cover
