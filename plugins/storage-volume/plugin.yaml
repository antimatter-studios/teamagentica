id: storage-volume
name: "Disk Storage"
description: "Namespace-isolated disk storage volumes. Provides persistent, mountable volumes with metadata and type labels (auth, storage). Other plugins discover it via the storage:disk capability."
group: storage
version: "1.2.8"
image: "teamagentica-storage-volume:latest"
author: teamagentica
tags: [storage, volume, block, disk, infrastructure, tool]
capabilities: ["storage:api", "storage:disk", "tool:storage:api", "tool:storage:disk"]
config_schema:
  STORAGE_VOLUMES_PATH:
    type: string
    label: "Volumes Path"
    default: "/data/volumes"
    help_text: "Path for namespace-isolated disk storage volumes. Each volume is a subdirectory."
    order: 1
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic to the debug console (may include sensitive data)"
    order: 99
