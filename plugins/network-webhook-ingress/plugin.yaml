group: network
version: "1.0.5"
image: "teamagentica-network-webhook-ingress:latest"
author: TeamAgentica
tags: [webhook, ingress, networking, routing]
capabilities: ["network:webhook"]
config_schema:
  WEBHOOK_INGRESS_PORT:
    type: number
    label: "Ingress Port"
    default: 9000
