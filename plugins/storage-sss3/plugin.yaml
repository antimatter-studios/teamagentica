id: storage-sss3
name: "S3 Storage"
description: "S3-compatible object storage powered by stupid-simple-s3"
group: storage
version: "1.0.13"
image: "teamagentica-storage-sss3:latest"
author: teamagentica
tags: [storage, s3, files, media, tool]
capabilities: ["storage:api", "storage:object", "tool:storage:api", "tool:storage:object"]
config_schema:
  S3_ENDPOINT:
    type: string
    label: "Endpoint"
    required: true
    default: "http://sss3:9000"
    order: 1
  S3_BUCKET:
    type: string
    label: "Bucket"
    required: true
    default: teamagentica
    order: 2
  S3_ACCESS_KEY:
    type: string
    label: "Access Key"
    required: true
    secret: true
    default: minioadmin
    order: 3
  S3_SECRET_KEY:
    type: string
    label: "Secret Key"
    required: true
    secret: true
    default: minioadmin
    order: 4
  S3_REGION:
    type: string
    label: "Region"
    default: us-east-1
    order: 5
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic to the debug console (may include sensitive data)"
    order: 99
