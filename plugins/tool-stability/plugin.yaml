id: tool-stability
name: "Stability AI Image"
description: "AI image generation powered by Stable Diffusion 3.5"
group: tools
version: "1.0.19"
image: "teamagentica-tool-stability:latest"
author: teamagentica
tags: [image, ai, tool, stability, stable-diffusion]
capabilities: ["agent:tool:image-gen"]
dependencies: ["cost:tracking"]
config_schema:
  STABILITY_API_KEY:
    type: string
    label: "API Key"
    required: true
    secret: true
    help_text: "Get your API key at https://platform.stability.ai/account/keys"
    order: 1
  STABILITY_MODEL:
    type: select
    label: Model
    default: sd3.5-large
    options:
      - label: "SD3.5 Large (6.5 credits)"
        value: sd3.5-large
      - label: "SD3.5 Large Turbo (4 credits)"
        value: sd3.5-large-turbo
      - label: "SD3.5 Medium (3.5 credits)"
        value: sd3.5-medium
      - label: "SD3.5 Flash (2.5 credits)"
        value: sd3.5-flash
    order: 2
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic to the debug console (may include sensitive data)"
    order: 99
default_pricing:
  - provider: stability
    model: sd3.5-large
    per_request: 0.065
    currency: USD
  - provider: stability
    model: sd3.5-large-turbo
    per_request: 0.04
    currency: USD
  - provider: stability
    model: sd3.5-medium
    per_request: 0.035
    currency: USD
  - provider: stability
    model: sd3.5-flash
    per_request: 0.025
    currency: USD
