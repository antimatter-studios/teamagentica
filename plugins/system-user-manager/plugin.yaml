id: system-user-manager
name: "User Manager"
description: "User authentication, account management, service tokens, and audit logging"
group: infrastructure
version: "0.1.15"
image: "teamagentica-system-user-manager:latest"
author: teamagentica
tags: [users, auth, login, security, accounts, jwt]
capabilities: ["system:users", "user:manage"]
config_schema:
  JWT_EXPIRY_HOURS:
    type: number
    label: "Token Expiry (hours)"
    default: "24"
    required: false
    help_text: "How long JWT tokens remain valid"
    order: 4
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    order: 99
