version: '3'

vars:
  BINARY_NAME: agent-kimi
  BUILD_DIR: ./build

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Build production binary
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - CGO_ENABLED=0 go build -ldflags="-s -w" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}}"

  test:
    desc: Run tests
    cmds:
      - go test ./... -v

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}

  docker:dev:
    desc: Build dev Docker image
    cmds:
      - docker build -t teamagentica-{{.BINARY_NAME}}:dev -f Dockerfile --target dev {{.ROOT_DIR}}

  docker:prod:
    desc: Build prod Docker image
    cmds:
      - docker build -t teamagentica-{{.BINARY_NAME}}:latest -f Dockerfile --target prod {{.ROOT_DIR}}
