server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets — long-lived cache.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every unmatched path serves index.html so React Router
    # (HTML5 history mode) takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must never be cached, otherwise browsers pin to a
    # stale bundle hash forever.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }
}
