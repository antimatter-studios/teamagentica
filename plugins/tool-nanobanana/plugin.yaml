id: tool-nanobanana
name: "Nano Banana Image"
description: "AI image generation using Google Gemini's native image output"
group: tools
version: "1.0.2"
image: "teamagentica-tool-nanobanana:latest"
author: teamagentica
tags: [image, ai, tool, gemini, google]
config_schema:
  GEMINI_API_KEY:
    type: string
    label: "API Key"
    required: true
    secret: true
    order: 1
  NANOBANANA_MODEL:
    type: select
    label: Model
    default: gemini-2.5-flash-image
    dynamic: true
    order: 2
  PLUGIN_ALIASES:
    type: aliases
    label: Aliases
    help_text: "Define routing aliases for this plugin. Each alias maps a short name to a plugin:model target."
    order: 90
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic to the debug console (may include sensitive data)"
    order: 99
default_pricing:
  - provider: nanobanana
    model: gemini-2.5-flash-image
    input_per_1m: 0.15
    output_per_1m: 0.60
    cached_per_1m: 0.0375
    currency: USD
  - provider: nanobanana
    model: gemini-3.1-flash-image-preview
    input_per_1m: 0.15
    output_per_1m: 0.60
    cached_per_1m: 0.0375
    currency: USD
  - provider: nanobanana
    model: gemini-3-pro-image-preview
    input_per_1m: 1.25
    output_per_1m: 10.00
    cached_per_1m: 0.3125
    currency: USD
