id: agent-openai
name: "OpenAI Agent"
description: "AI agent powered by OpenAI GPT and Codex models with chat and completion capabilities"
group: agents
version: "1.0.73"
image: "teamagentica-agent-openai:latest"
author: teamagentica
tags: [chat, ai, agent, codex]
capabilities: ["agent:openai", "agent:chat", "agent:completion", "workspace:environment"]
dependencies: ["cost:tracking", "storage:disk"]
requested_scopes: ["memory.read", "memory.write", "relay.send", "persona.read", "workspace.create"]
shared_disks:
  - name: agent-openai
    type: shared
    target: /home/coder/.codex
  - name: agent-openai-sidecar
    type: shared
    target: /sidecar-bin
config_schema:
  OPENAI_BACKEND:
    type: select
    label: Backend
    default: subscription
    options: [subscription, api_key]
    help_text: "Choose how to authenticate with OpenAI"
    order: 1
  OPENAI_AUTH:
    type: oauth
    oauth_method: device_code
    label: "Login with OpenAI"
    help_text: "Authenticate with your OpenAI account to use Codex models"
    visible_when:
      field: OPENAI_BACKEND
      value: subscription
    order: 2
  OPENAI_API_KEY:
    type: string
    label: "API Key"
    required: true
    secret: true
    help_text: "Get your API key at https://platform.openai.com/api-keys"
    visible_when:
      field: OPENAI_BACKEND
      value: api_key
    order: 2
  OPENAI_MODEL:
    type: select
    label: Model
    default: gpt-4o
    dynamic: true
    order: 3
  CODEX_APPROVAL_MODE:
    type: select
    label: "Codex Approval Mode"
    default: suggest
    options: [suggest, auto-edit, full-auto]
    help_text: "suggest: asks before everything. auto-edit: auto-approves file changes. full-auto: auto-approves everything (workspace terminal only)"
    visible_when:
      field: OPENAI_BACKEND
      value: subscription
    order: 10
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic to the debug console (may include sensitive data)"
    order: 99
