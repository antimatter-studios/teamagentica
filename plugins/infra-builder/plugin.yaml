id: infra-builder
name: "Docker Builder"
description: "Builds Docker images from source in storage-disk shared or workspace disks"
group: infrastructure
version: "1.0.13"
image: "teamagentica-infra-builder:latest"
author: teamagentica
tags: [system, build, docker, infrastructure]
capabilities: ["infra:builder"]
dependencies: ["storage:disk"]
requested_scopes: ["container.build", "deploy.candidate"]
config_schema:
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed build output to the debug console"
    order: 99
