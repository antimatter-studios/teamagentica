[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:sidecar]
command=/usr/local/bin/infra-agent-memory-lcm
autostart=true
autorestart=true
startretries=10
startsecs=2
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:lcm]
command=npx tsx /app/lcm-server/server.ts
autostart=true
autorestart=true
startretries=10
startsecs=5
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=LCM_DATABASE_PATH="/data/lcm.db",LCM_PORT="8092",NODE_ENV="production"
