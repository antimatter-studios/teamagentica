id: infra-agent-memory
name: "Agent Memory"
description: "Persistent semantic memory for agents — powered by Mem0 with embedded Qdrant vector store"
group: infrastructure
version: "0.3.25"
image: "teamagentica-infra-agent-memory:latest"
author: teamagentica
tags: [memory, agents, semantic, facts, mem0]
capabilities: ["tool:memory"]
config_schema:
  MEM0_LLM_ALIAS:
    type: select
    label: "LLM Alias"
    description: "Alias for memory fact extraction (extracts facts from conversations)"
    dynamic: true
    help_text: "Only aliases from plugins with memory:extraction capability are shown"
    order: 1
  MEM0_EMBEDDER_ALIAS:
    type: select
    label: "Embedder Alias"
    description: "Alias for generating text embeddings (semantic memory search)"
    dynamic: true
    help_text: "Only aliases from plugins with memory:extraction capability are shown"
    order: 2
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    description: "Enable debug logging"
    default: "false"
    required: false
    order: 99
