id: infra-agent-memory
name: "Agent Memory"
description: "Persistent conversation memory for agents — stores session history and provides a swappable memory backend"
group: infrastructure
version: "0.2.7"
image: "teamagentica-infra-agent-memory:latest"
author: teamagentica
tags: [memory, agents, history, sessions]
capabilities: ["tool:memory"]
configSchema:
  PLUGIN_PORT:
    type: number
    label: "Port"
    description: "HTTP port for this plugin"
    default: "8091"
    required: false
  PLUGIN_DATA_PATH:
    type: string
    label: "Data Path"
    description: "Path to store the memory database"
    default: "/data"
    required: false
  MAX_SESSION_MESSAGES:
    type: number
    label: "Max Messages Per Session"
    description: "Maximum number of messages to retain per session before pruning oldest"
    default: "50"
    required: false
  SESSION_TTL_HOURS:
    type: number
    label: "Session TTL (hours)"
    description: "Hours of inactivity before a session is expired and pruned"
    default: "24"
    required: false
  EXTRACTION_PERSONA:
    type: string
    label: "Extraction Persona (fallback)"
    description: "Fallback persona alias if no persona has the 'memory' role assigned"
    default: "brains"
    required: false
  COMPACT_AFTER_MESSAGES:
    type: number
    label: "Compact After Messages"
    description: "Number of messages per session before triggering automatic compaction"
    default: "100"
    required: false
  COMPACT_INTERVAL_MINUTES:
    type: number
    label: "Compact Interval (minutes)"
    description: "Maximum minutes between compaction cycles per session"
    default: "30"
    required: false
  ACTIVITY_LOG_SIZE:
    type: number
    label: "Activity Log Size"
    description: "Number of recent memory operations to display in the activity feed (100-1000)"
    default: "100"
    required: false
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    description: "Enable debug logging"
    default: "false"
    required: false
