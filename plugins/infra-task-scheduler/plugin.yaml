id: infra-task-scheduler
name: "Task Scheduler"
description: "Scheduled task system for automated workflows and recurring jobs"
group: infrastructure
version: "1.0.16"
image: "teamagentica-infra-task-scheduler:latest"
author: teamagentica
tags: [infrastructure, scheduler, automation, tasks]
capabilities: ["infra:scheduler", "tool:scheduler"]
config_schema:
  DISPATCH_ENABLED:
    type: boolean
    label: "Enable Dispatch Queue"
    default: "true"
    help_text: "Process task assignment events and dispatch work to agents"
    order: 10
  DISPATCH_GLOBAL_LIMIT:
    type: string
    label: "Global Concurrency Limit"
    default: ""
    help_text: "Max concurrent dispatches across all agents (empty = unlimited)"
    order: 11
  DISPATCH_AGENT_LIMITS:
    type: string
    label: "Per-Agent Concurrency Limits"
    default: ""
    help_text: 'JSON object of agent alias to max concurrent, e.g. {"claude":1,"gemini":2}'
    order: 12
  DISPATCH_PROMPT_TEMPLATE:
    type: string
    label: "Dispatch Prompt Template"
    default: ""
    help_text: "Override the default Go text/template used for agent prompts (leave empty for default)"
    order: 13
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic to the debug console (may include sensitive data)"
    order: 99
