id: agent-claude
name: "Claude Agent"
description: "AI agent powered by Anthropic Claude models with CLI and API backends, workspace support, and MCP integration"
group: agents
version: "1.0.71"
image: "teamagentica-agent-claude:latest"
author: teamagentica
tags: [chat, ai, agent, claude, anthropic]
capabilities: ["agent:openai", "agent:chat", "agent:completion"]
dependencies: ["cost:tracking"]
config_schema:
  CLAUDE_BACKEND:
    type: select
    label: Backend
    default: cli
    options: [cli, api_key]
    help_text: "Choose how to interact with Claude"
    order: 1
  CLAUDE_AUTH:
    type: oauth
    label: "Login with Anthropic"
    help_text: "Authenticate with your Anthropic account to use Claude models"
    visible_when:
      field: CLAUDE_BACKEND
      value: cli
    order: 2
  ANTHROPIC_API_KEY:
    type: string
    label: "API Key"
    required: true
    secret: true
    help_text: "Get your API key at https://console.anthropic.com/settings/keys"
    visible_when:
      field: CLAUDE_BACKEND
      value: api_key
    order: 3
  CLAUDE_MODEL:
    type: select
    label: Model
    default: claude-sonnet-4-6
    dynamic: true
    order: 4
  CLAUDE_SKIP_PERMISSIONS:
    type: boolean
    label: "Skip Permissions"
    default: "false"
    help_text: "Auto-approve all tool use (WebFetch, Bash, etc.) without prompting. Safe for headless agent containers."
    visible_when:
      field: CLAUDE_BACKEND
      value: cli
    order: 10
  CLAUDE_POOL_MAX:
    type: string
    label: "CLI Pool Max Size"
    default: "10"
    help_text: "Maximum number of CLI processes allowed in the hot pool. The pool always starts with 2 and grows on demand up to this limit. Each process uses ~70MB of memory."
    visible_when:
      field: CLAUDE_BACKEND
      value: cli
    order: 11
  CLAUDE_POOL_TTL:
    type: string
    label: "CLI Pool Idle TTL (seconds)"
    default: "120"
    help_text: "Seconds an idle CLI process stays alive before being recycled. Lower values free memory faster, higher values avoid cold starts for bursty conversations."
    visible_when:
      field: CLAUDE_BACKEND
      value: cli
    order: 12
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic to the debug console (may include sensitive data)"
    order: 99
default_pricing:
  - provider: anthropic
    model: claude-opus-4-6
    input_per_1m: 15.00
    output_per_1m: 75.00
    cached_per_1m: 1.875
    currency: USD
  - provider: anthropic
    model: claude-sonnet-4-6
    input_per_1m: 3.00
    output_per_1m: 15.00
    cached_per_1m: 0.375
    currency: USD
  - provider: anthropic
    model: claude-haiku-4-5-20251001
    input_per_1m: 0.80
    output_per_1m: 4.00
    cached_per_1m: 0.08
    currency: USD
