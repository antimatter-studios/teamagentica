id: workspace-manager
name: "Workspace Manager"
description: "Orchestrates workspace environments — discovers workspace plugins, manages container lifecycle, and creates isolated volumes"
group: workspace
version: "1.0.33"
image: "teamagentica-workspace-manager:latest"
author: teamagentica
tags: [infrastructure]
capabilities: ["workspace:manager", "chat:commands"]
config_schema:
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic to the debug console (may include sensitive data)"
    order: 99
