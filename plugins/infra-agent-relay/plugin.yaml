id: infra-agent-relay
name: "Agent Relay"
description: "Routes messages between messaging plugins and agent-bridge instances running in workspace containers"
group: infrastructure
version: "0.1.7"
image: "teamagentica-infra-agent-relay:latest"
author: teamagentica
tags: [infrastructure]
capabilities: ["infra:agent-relay"]
config_schema:
  DEFAULT_COORDINATOR:
    type: select
    label: "Default Coordinator"
    dynamic: true
    help_text: "Fallback coordinator alias for any messaging plugin without a specific coordinator set. The first coordinator registered will be used as the default if this is unset."
    order: 1
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic"
    order: 99


