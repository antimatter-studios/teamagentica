version: '3'

vars:
  BINARY_NAME: cost-explorer
  BUILD_DIR: ./build

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Build production binary
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - CGO_ENABLED=1 go build -ldflags="-s -w" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}}"

  test:
    desc: Run tests
    cmds:
      - go test ./... -v

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
