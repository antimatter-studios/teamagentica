id: infra-agent-persona
name: "Agent Persona Manager"
description: "Manages agent personalities — system prompts, model overrides, and backend routing for agent aliases"
group: infrastructure
version: "1.0.9"
image: "teamagentica-infra-agent-persona:latest"
author: teamagentica
tags: [infrastructure, agents]
capabilities: ["tool:personas"]
config_schema:
  RESET_PROMPTS:
    type: boolean
    label: "Reset Role Prompts"
    default: "false"
    help_text: "Set to true and save to overwrite all role system prompts with the built-in defaults. Toggle back to false after use."
    order: 1
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic to the debug console (may include sensitive data)"
    order: 99
