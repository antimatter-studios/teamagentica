id: storage-disk
name: "Disk Storage"
description: "Namespace-isolated disk storage disks. Provides persistent, mountable disks with metadata and type labels (auth, storage). Other plugins discover it via the storage:disk capability."
group: storage
version: "1.2.25"
image: "teamagentica-storage-disk:latest"
author: teamagentica
tags: [storage, disk, block, infrastructure, tool]
capabilities: ["storage:api", "storage:disk", "tool:storage:api", "tool:storage:disk", "chat:commands"]
config_schema:
  STORAGE_ROOT_PATH:
    type: string
    label: "Storage Root"
    default: "/data/storage-root"
    help_text: "Root path for disk storage. Contains shared/ and workspace/ subdirectories."
    order: 1
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic to the debug console (may include sensitive data)"
    order: 99
