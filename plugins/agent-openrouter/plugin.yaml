id: agent-openrouter
name: "OpenRouter"
description: "AI router providing access to hundreds of models from OpenAI, Anthropic, Google, Meta and more via OpenRouter"
group: agents
version: "1.0.6"
image: "teamagentica-agent-openrouter:latest"
author: teamagentica
tags: [chat, ai, agent, openrouter, router]
capabilities: ["agent:chat", "agent:completion"]
dependencies: ["cost:tracking"]
config_schema:
  OPENROUTER_API_KEY:
    type: string
    label: "API Key"
    required: true
    secret: true
    order: 1
  OPENROUTER_MODEL:
    type: select
    label: Model
    default: google/gemini-2.5-flash
    dynamic: true
    order: 2
  PLUGIN_DEBUG:
    type: boolean
    label: "Debug Mode"
    default: "false"
    help_text: "Log detailed request/response traffic to the debug console (may include sensitive data)"
    order: 99
default_pricing:
  - provider: openrouter
    model: google/gemini-2.5-flash
    input_per_1m: 0.15
    output_per_1m: 0.60
    cached_per_1m: 0.0375
    currency: USD
  - provider: openrouter
    model: openai/gpt-4o
    input_per_1m: 2.50
    output_per_1m: 10.00
    cached_per_1m: 1.25
    currency: USD
  - provider: openrouter
    model: anthropic/claude-sonnet-4
    input_per_1m: 3.00
    output_per_1m: 15.00
    cached_per_1m: 0.30
    currency: USD
  - provider: openrouter
    model: google/gemini-2.5-pro
    input_per_1m: 1.25
    output_per_1m: 10.00
    cached_per_1m: 0.3125
    currency: USD
  - provider: openrouter
    model: meta-llama/llama-4-maverick
    input_per_1m: 0.50
    output_per_1m: 1.50
    currency: USD
